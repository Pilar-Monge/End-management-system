name: Dependency Review

on:
  pull_request:
    branches:
      - "**"

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    if: ${{ github.event.repository && github.event.repository.has_advanced_security == true }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Review dependencies
        uses: actions/dependency-review-action@v4
